schema_version: canaryweave.model_registry.safe.v1
created_by: klive
purpose: >
  Safe placeholders for benign ASR interaction research. Exact provider model
  identifiers and availability must be verified in the configured Hermes/provider
  account before live use. Entries are disabled by default.
provider_defaults:
  timeout_seconds: 60
  max_retries: 2
  retry_backoff_seconds: [1, 3]
  temperature: 0
  top_p: 1
  max_output_tokens: 1024
  stream: false
  tool_choice: auto
  safety_mode: benign_canary_only
models:
  - model_id: openai_gpt4o_smoke
    provider: openai
    provider_model_name: gpt-4o
    display_name: GPT-4o
    family: gpt-4o
    api_env_var: OPENAI_API_KEY
    enabled_by_default: false
    exact_availability: verify_in_account
    supports_tools: true
    supports_json_schema: true
    default_mode: provider_api
    notes: Smoke recommendation; exact ID may vary.
  - model_id: openai_gpt4o_mini_smoke
    provider: openai
    provider_model_name: gpt-4o-mini
    display_name: GPT-4o mini
    family: gpt-4o
    api_env_var: OPENAI_API_KEY
    enabled_by_default: false
    exact_availability: verify_in_account
    supports_tools: true
    supports_json_schema: true
    default_mode: provider_api
    notes: Lower-cost smoke candidate if available.
  - model_id: anthropic_claude_sonnet_4_6_smoke
    provider: anthropic
    provider_model_name: claude-sonnet-4.6
    display_name: Claude Sonnet 4.6
    family: claude-sonnet
    api_env_var: ANTHROPIC_API_KEY
    enabled_by_default: false
    exact_availability: verify_in_account
    supports_tools: true
    supports_json_schema: partial_or_adapter
    default_mode: provider_api
    notes: User-requested Sonnet placeholder; verify actual account model ID.
  - model_id: anthropic_claude_sonnet_4_smoke
    provider: anthropic
    provider_model_name: claude-sonnet-4
    display_name: Claude Sonnet 4
    family: claude-sonnet
    api_env_var: ANTHROPIC_API_KEY
    enabled_by_default: false
    exact_availability: verify_in_account
    supports_tools: true
    supports_json_schema: partial_or_adapter
    default_mode: provider_api
    notes: Sonnet-family fallback placeholder.
  - model_id: local_or_openrouter_frontier_placeholder
    provider: hermes_configured
    provider_model_name: configured-by-hermes
    display_name: Hermes configured frontier model
    family: configured
    api_env_var: HERMES_PROVIDER_CONFIG
    enabled_by_default: false
    exact_availability: verify_in_hermes_config
    supports_tools: provider_dependent
    supports_json_schema: provider_dependent
    default_mode: hermes_klive
    notes: Use for other models once configured in Hermes.
